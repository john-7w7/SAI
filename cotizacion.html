  <section class="quote-section py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8" data-aos="fade-up">
          <div class="glass-card form-card">
            <div id="quoteAlert" class="alert d-none" role="alert"></div>

            <form id="quoteForm" class="row g-3" novalidate>
              <div class="col-md-6">
                <label class="form-label" for="nombre">Nombre completo</label>
                <input class="form-control" id="nombre" name="nombre" type="text" required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="empresa">Empresa</label>
                <input class="form-control" id="empresa" name="empresa" type="text" />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="correo">Correo</label>
                <input class="form-control" id="correo" name="correo" type="email" required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="telefono">Teléfono</label>
                <input class="form-control" id="telefono" name="telefono" type="tel" required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="servicio">Servicio</label>
                <select class="form-select" id="servicio" name="servicio" required>
                  <option value="">Selecciona</option>
                  <option>Automatización industrial</option>
                  <option>Reconstrucción de maquinaria</option>
                  <option>Control industrial</option>
                  <option>Instrumentación industrial</option>
                  <option>Instalaciones eléctricas</option>
                  <option>Maquinados</option>
                  <option>Outsourcing</option>
                  <option>Señalética e identificación industrial</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label" for="prioridad">Estatus</label>
                <select class="form-select" id="prioridad" name="prioridad" required>
                  <option value="">Selecciona</option>
                  <option value="urgente">Urgente</option>
                  <option value="sin urgencia">Sin urgencia</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label" for="descripcion">Descripción del proyecto</label>
                <textarea class="form-control" id="descripcion" name="descripcion" rows="5" required></textarea>
              </div>

              <div class="col-md-6">
                <label class="form-label" for="ciudad">Ciudad / Estado</label>
                <input class="form-control" id="ciudad" name="ciudad" type="text" required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="fechaNecesaria">Fecha requerida</label>
                <input class="form-control" id="fechaNecesaria" name="fechaNecesaria" type="date" />
              </div>

              <div class="col-12">
                <div class="form-check consent-box">
                  <input class="form-check-input" type="checkbox" id="acepto" required>
                  <label class="form-check-label" for="acepto">
                    Acepto el tratamiento de mis datos para recibir respuesta a mi cotización.
                  </label>
                </div>
              </div>

              <div class="col-12 d-flex gap-3 flex-wrap align-items-center">
                <button id="submitQuoteBtn" class="btn btn-quote submit-btn" type="submit">
                  <span class="btn-label">Enviar cotización</span>
                  <span class="btn-loader d-none"><i class="fa-solid fa-spinner fa-spin"></i> Enviando...</span>
                </button>
                <small class="form-help">Estado inicial del panel: <strong>Enviado</strong>.</small>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </section>
