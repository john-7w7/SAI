<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de cotización | SAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div>
        <img src="../assets/img/sai2.png" alt="SAI" class="admin-side-logo">
        <h2>SAI Panel</h2>
        <p>Ruta privada</p>
      </div>
      <nav class="admin-nav">
        <a class="active" href="panel.html"><i class="fa-solid fa-file-invoice-dollar"></i> Control de cotización</a>
      </nav>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm w-100 mt-4">Cerrar sesión</button>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1>Control de cotización</h1>
          <p>Solicitudes que llegan desde cotizacion.html</p>
        </div>
      </div>
      <section class="stats-grid">
        <article class="stat-box naranja"><span>Enviado</span><strong id="count-enviado">0</strong></article>
        <article class="stat-box amarillo"><span>Autorizado</span><strong id="count-autorizado">0</strong></article>
        <article class="stat-box azul"><span>Facturado</span><strong id="count-facturado">0</strong></article>
        <article class="stat-box rojo"><span>Cancelado</span><strong id="count-cancelado">0</strong></article>
      </section>
      <div class="table-wrap">
        <table class="table admin-table align-middle">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Servicio</th>
              <th>Urgencia</th>
              <th>Descripción</th>
              <th>Ciudad</th>
              <th>Fecha</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="cotizacionesBody">
            <tr><td colspan="9" class="text-center text-muted py-4">Cargando cotizaciones...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script type="module" src="../assets/js/firebase-config.js"></script>
  <script type="module" src="../assets/js/admin-panel.js"></script>
</body>
</html>
