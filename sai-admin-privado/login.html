<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login-shell">
    <div class="admin-login-card">
      <div class="text-center mb-4">
        <img src="../assets/img/sai2.png" alt="SAI" class="admin-logo">
        <h1>Panel SAI</h1>
      </div>
      <div id="loginAlert" class="alert d-none"></div>
      <form id="loginForm" class="row g-3">
        <div class="col-12">
          <label class="form-label" for="email">Correo</label>
          <input class="form-control" id="email" type="email" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-control" id="password" type="password" required>
        </div>
        <div class="col-12">
          <button class="btn btn-danger w-100" type="submit">Ingresar</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="../assets/js/firebase-config.js"></script>
  <script type="module" src="../assets/js/admin-login.js"></script>
</body>
</html>
